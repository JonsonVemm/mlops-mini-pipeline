name: CI API Fraude

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────
  # JOB 1: QUALIDADE (Rápido - Roda em todo PR e Push)
  # ─────────────────────────────────────────────────────
  qualidade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Diagnóstico do ambiente
        run: |
          echo "=== Python ==="
          python --version
          echo "=== Dependências instaladas ==="
          pip list
          echo "=== Arquivos do projeto ==="
          test -f main.py          && echo "✅ main.py"          || echo "❌ main.py ausente"
          test -f requirements.txt && echo "✅ requirements.txt" || echo "❌ requirements.txt ausente"
          test -d tests/           && echo "✅ tests/"           || echo "❌ tests/ ausente"
      - name: Verificar formatação
        run: black --check .
      - name: Verificar imports não utilizados
        run: autoflake --check --remove-all-unused-imports -r .
      - name: Rodar testes essenciais (Smoke)
        run: python -m pytest tests/ -m smoke -v --tb=short

  # ─────────────────────────────────────────────────────
  # JOB 2: INTEGRAÇÃO (Pesado - Roda só na Main)
  # ─────────────────────────────────────────────────────
  integracao:
    runs-on: ubuntu-latest
    needs: qualidade
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache do modelo Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-v1-${{ hashFiles('requirements.txt') }}
      - name: Verificar autenticação com Hugging Face
        run: python -c "import os; assert os.environ.get('HF_TOKEN'), 'HF_TOKEN não configurado'"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      - name: Rodar TODOS os testes de integração
        run: python -m pytest tests/ -v --tb=short
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  # ─────────────────────────────────────────────────────
  # JOB 3: RELATÓRIO (Prepara o terreno para um Deploy futuro)
  # ─────────────────────────────────────────────────────
  relatorio:
    runs-on: ubuntu-latest
    needs: integracao
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Resumo do pipeline
        run: |
          echo "================================================"
          echo "  Pipeline da API de Fraudes concluído ✅"
          echo "================================================"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Autor:   ${{ github.actor }}"
          echo "================================================"