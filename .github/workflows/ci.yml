name: CI API Fraude

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1: O INSPETOR RÁPIDO
  verificar-sintaxe:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ferramentas de qualidade
        run: pip install autoflake black

      - name: Verificar imports não utilizados
        run: autoflake --check --remove-all-unused-imports -r .

      - name: Verificar formatação
        run: black --check .

  # JOB 2: O TESTE PESADO
  verificar-api:
    runs-on: ubuntu-latest
    needs: verificar-sintaxe     

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes
        run: python -m pytest tests/ -v --tb=short